<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&L Collective — STR Arbitrage Deal Flow</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d2c0;
    --radius: 8px;
    --col-research: #8b949e;
    --col-contacted: #58a6ff;
    --col-review: #39d2c0;
    --col-negotiation: #d29922;
    --col-licensing: #bc8cff;
    --col-active: #3fb950;
    --col-hold: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 24px;
    font-weight: 600;
  }
  .header-left .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .stat-value {
    font-weight: 700;
    font-size: 18px;
  }
  .board {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 20px;
    min-height: 70vh;
  }
  .column {
    min-width: 240px;
    max-width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 160px);
  }
  .column-header {
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
  }
  .col-research .column-header { border-top: 3px solid var(--col-research); }
  .col-contacted .column-header { border-top: 3px solid var(--col-contacted); }
  .col-review .column-header { border-top: 3px solid var(--col-review); }
  .col-negotiation .column-header { border-top: 3px solid var(--col-negotiation); }
  .col-licensing .column-header { border-top: 3px solid var(--col-licensing); }
  .col-active .column-header { border-top: 3px solid var(--col-active); }
  .col-hold .column-header { border-top: 3px solid var(--col-hold); }
  .column-header .count {
    background: var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .column-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    min-height: 80px;
    transition: background 0.15s;
  }
  .column-body.drop-highlight {
    background: var(--surface-hover);
  }
  .card {
    background: #1a1f2e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }
  .card.dragging {
    opacity: 0.5;
    transform: rotate(2deg);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(88,166,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.2);
  }
  .tag-rent { background: rgba(188,140,255,0.12); color: var(--purple); border-color: rgba(188,140,255,0.2); }
  .tag-spread { background: rgba(63,185,80,0.12); color: var(--green); border-color: rgba(63,185,80,0.2); }
  .tag-revenue { background: rgba(210,153,34,0.12); color: var(--orange); border-color: rgba(210,153,34,0.2); }
  .card-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    justify-content: flex-end;
  }
  .card-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .card-actions button:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .card-actions .btn-edit:hover { border-color: var(--accent); }
  .card-actions .btn-delete:hover { border-color: var(--red); color: var(--red); }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); background: var(--surface-hover); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn-primary:hover { background: #4a96e5; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 90%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-row .form-group { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    padding: 24px 8px;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  @media (max-width: 768px) {
    .board { flex-direction: column; overflow-x: visible; }
    .column { min-width: 100%; max-width: 100%; max-height: none; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🏘️ STR Arbitrage Deal Flow</h1>
    <div class="subtitle">R&L Collective Holdings — Track your pipeline from market research to active listings</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="exportData()">📥 Export</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">📤 Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Property</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Add Property</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Property Name</label>
      <input id="fName" placeholder="e.g. 4603 Lennox Dr - 2BR">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input id="fCity" placeholder="Austin">
      </div>
      <div class="form-group">
        <label>State</label>
        <input id="fState" placeholder="TX">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Monthly Rent</label>
        <input id="fRent" type="number" placeholder="2000">
      </div>
      <div class="form-group">
        <label>Est. Monthly Revenue</label>
        <input id="fRevenue" type="number" placeholder="3600">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Est. Monthly Spread</label>
        <input id="fSpread" type="number" placeholder="1600">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="research">📋 Research</option>
          <option value="contacted">📞 Contacted</option>
          <option value="review">🔍 Under Review</option>
          <option value="negotiation">🤝 Negotiation</option>
          <option value="licensing">📄 Licensing</option>
          <option value="active">🟢 Active</option>
          <option value="hold">⏸️ On Hold</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes / Deal Details</label>
      <textarea id="fNotes" placeholder="Lease terms, landlord contact, license status, next steps..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProperty()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Default Data ─────────────────────────────────────────────────
const COLUMNS = [
  { id: 'research',     label: '📋 Research',     color: 'var(--col-research)' },
  { id: 'contacted',    label: '📞 Contacted',    color: 'var(--col-contacted)' },
  { id: 'review',       label: '🔍 Under Review', color: 'var(--col-review)' },
  { id: 'negotiation',  label: '🤝 Negotiation',  color: 'var(--col-negotiation)' },
  { id: 'licensing',    label: '📄 Licensing',    color: 'var(--col-licensing)' },
  { id: 'active',       label: '🟢 Active',       color: 'var(--col-active)' },
  { id: 'hold',         label: '⏸️ On Hold',      color: 'var(--col-hold)' },
];

const DEFAULT_PROPERTIES = [
  { id: 'p1',  name: '4603 Lennox Dr — 2BR', city: 'Austin', state: 'TX', rent: 2000, revenue: 3600, spread: 1600, status: 'review', notes: 'Furnished 2BR. $2,000/mo. STR license pending. Landlord permission in writing.' },
  { id: 'p2',  name: '4603 Lennox Dr — 4BR', city: 'Austin', state: 'TX', rent: 2495, revenue: 5850, spread: 3355, status: 'review', notes: 'Furnished 4BR. $2,495/mo. Best unit in the deal. SXSW will pay a month\'s rent in 4-5 nights.' },
  { id: 'p3',  name: 'Nashville Market', city: 'Nashville', state: 'TN', rent: 1892, revenue: 4500, spread: 2608, status: 'research', notes: 'Top arbitrage market. $190-300/night. Party tourism. Need to find 2BR near Music Row/East Nash.' },
  { id: 'p4',  name: 'Columbus Market', city: 'Columbus', state: 'OH', rent: 1420, revenue: 2800, spread: 1380, status: 'research', notes: 'Lowest rent of any market. OSU games. No STR restrictions. Target: Short North or German Village.' },
  { id: 'p5',  name: 'Orlando Market', city: 'Orlando', state: 'FL', rent: 2429, revenue: 4800, spread: 2371, status: 'research', notes: 'Disney area. 75%+ occupancy. $175-300/night. High rent but high revenue ceiling.' },
  { id: 'p6',  name: 'Phoenix Market', city: 'Phoenix', state: 'AZ', rent: 2354, revenue: 4500, spread: 2146, status: 'research', notes: 'State law protects STRs. Spring training. $180-280/night. Find 2-3BR near downtown.' },
  { id: 'p7',  name: 'Atlanta Market', city: 'Atlanta', state: 'GA', rent: 1815, revenue: 3500, spread: 1685, status: 'research', notes: 'Corporate demand fills weeknights. $150-230/night. Midtown or Old Fourth Ward.' },
  { id: 'p8',  name: 'Memphis Market', city: 'Memphis', state: 'TN', rent: 1635, revenue: 2700, spread: 1065, status: 'research', notes: 'Lowest entry cost. $120-170/night. Music tourism. TN state law protects STRs.' },
  { id: 'p9',  name: 'Kansas City Market', city: 'Kansas City', state: 'MO', rent: 1645, revenue: 2800, spread: 1155, status: 'research', notes: 'Very permissive. No STR restrictions. $130-180/night. Chiefs/World Cup potential.' },
  { id: 'p10', name: 'San Antonio Market', city: 'San Antonio', state: 'TX', rent: 1814, revenue: 3000, spread: 1186, status: 'research', notes: 'Riverwalk tourism. No restrictions. $140-200/night. Affordable Austin alternative.' },
  { id: 'p11', name: 'Charlotte Market', city: 'Charlotte', state: 'NC', rent: 1866, revenue: 3200, spread: 1334, status: 'research', notes: 'Banking hub. $145-210/night. Corporate demand. NoDa or South End.' },
  { id: 'p12', name: 'Tampa Market', city: 'Tampa', state: 'FL', rent: 2456, revenue: 3800, spread: 1344, status: 'research', notes: 'Fastest growing FL metro. $160-250/night. St. Pete is hot. Higher rent but strong demand.' },
  { id: 'p13', name: 'Gulf Shores Market', city: 'Gulf Shores', state: 'AL', rent: 1800, revenue: 3500, spread: 1700, status: 'research', notes: 'No STR restrictions. Beach tourism. $180-280/night. Strong seasonal peaks.' },
];

// ─── State ────────────────────────────────────────────────────────
let properties = [];

function loadData() {
  // Try external JSON file first (I update this when researching new properties)
  const xhr = new XMLHttpRequest();
  xhr.open('GET', 'properties.json', false); // sync fallback
  try {
    xhr.send();
    if (xhr.status === 200) {
      const external = JSON.parse(xhr.responseText);
      if (Array.isArray(external) && external.length > 0) {
        properties = external;
        saveData();
        return;
      }
    }
  } catch(e) { /* fall through to defaults */ }

  // Then check localStorage
  const stored = localStorage.getItem('rl_str_properties');
  if (stored) {
    try { properties = JSON.parse(stored); } catch(e) { properties = [...DEFAULT_PROPERTIES]; }
  } else {
    properties = [...DEFAULT_PROPERTIES];
  }
  saveData();
}

function saveData() {
  localStorage.setItem('rl_str_properties', JSON.stringify(properties));
}

// ─── Render ───────────────────────────────────────────────────────
function render() {
  renderBoard();
  renderStats();
}

function renderStats() {
  const total = properties.length;
  const active = properties.filter(p => p.status === 'active').length;
  const review = properties.filter(p => p.status === 'review' || p.status === 'licensing' || p.status === 'negotiation').length;
  const research = properties.filter(p => p.status === 'research' || p.status === 'contacted').length;
  const totalSpread = properties.reduce((sum, p) => sum + (p.spread || 0), 0);
  const totalRevenue = properties.reduce((sum, p) => sum + (p.revenue || 0), 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span class="stat-value">${total}</span> Total Properties</div>
    <div class="stat"><span class="stat-value" style="color:var(--green)">${active}</span> Active</div>
    <div class="stat"><span class="stat-value" style="color:var(--cyan)">${review}</span> In Progress</div>
    <div class="stat"><span class="stat-value" style="color:var(--text-muted)">${research}</span> Researching</div>
    <div class="stat"><span class="stat-value" style="color:var(--orange)">$${(totalRevenue).toLocaleString()}</span> Est. Monthly Revenue</div>
    <div class="stat"><span class="stat-value" style="color:var(--green)">$${(totalSpread).toLocaleString()}</span> Est. Total Spread</div>
  `;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const items = properties.filter(p => p.status === col.id);
    return `
      <div class="column col-${col.id}" data-col="${col.id}">
        <div class="column-header">
          <span>${col.label}</span>
          <span class="count">${items.length}</span>
        </div>
        <div class="column-body" data-col="${col.id}"
             ondragover="onDragOver(event)"
             ondrop="onDrop(event)">
          ${items.length === 0 ? '<div class="empty-state">Drop a property here</div>' : ''}
          ${items.map(p => renderCard(p)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(p) {
  const rentStr = p.rent ? `$${p.rent.toLocaleString()}/mo` : '';
  const spreadStr = p.spread ? `$${p.spread.toLocaleString()}` : '';
  const revStr = p.revenue ? `$${p.revenue.toLocaleString()}` : '';
  return `
    <div class="card" draggable="true"
         data-id="${p.id}"
         ondragstart="onDragStart(event)"
         ondragend="onDragEnd(event)">
      <div class="card-title">${p.name}</div>
      <div class="card-meta">${p.city}, ${p.state}</div>
      <div class="card-tags">
        ${rentStr ? `<span class="tag tag-rent">${rentStr}</span>` : ''}
        ${revStr ? `<span class="tag tag-revenue">Rev: ${revStr}</span>` : ''}
        ${spreadStr ? `<span class="tag tag-spread">Spread: ${spreadStr}</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openEditModal('${p.id}')">✏️ Edit</button>
        <button class="btn-delete" onclick="deleteProperty('${p.id}')">🗑️</button>
      </div>
    </div>
  `;
}

// ─── Drag & Drop ──────────────────────────────────────────────────
let dragId = null;

function onDragStart(e) {
  dragId = e.target.closest('.card')?.dataset?.id;
  if (dragId) e.target.classList.add('dragging');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drop-highlight').forEach(el => el.classList.remove('drop-highlight'));
}

function onDragOver(e) {
  const body = e.target.closest('.column-body');
  if (body) { e.preventDefault(); body.classList.add('drop-highlight'); }
}

function onDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.drop-highlight').forEach(el => el.classList.remove('drop-highlight'));
  const body = e.target.closest('.column-body');
  if (!body || !dragId) return;
  const newStatus = body.dataset.col;
  const prop = properties.find(p => p.id === dragId);
  if (prop && prop.status !== newStatus) {
    prop.status = newStatus;
    saveData();
    render();
    showToast(`Moved to ${COLUMNS.find(c => c.id === newStatus)?.label || newStatus}`);
  }
  dragId = null;
}

// ─── CRUD ─────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modalTitle').textContent = '➕ Add Property';
  document.getElementById('editId').value = '';
  ['fName','fCity','fState','fRent','fRevenue','fSpread','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fStatus').value = 'research';
  document.getElementById('modal').classList.add('show');
}

function openEditModal(id) {
  const p = properties.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '✏️ Edit Property';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = p.name || '';
  document.getElementById('fCity').value = p.city || '';
  document.getElementById('fState').value = p.state || '';
  document.getElementById('fRent').value = p.rent || '';
  document.getElementById('fRevenue').value = p.revenue || '';
  document.getElementById('fSpread').value = p.spread || '';
  document.getElementById('fStatus').value = p.status || 'research';
  document.getElementById('fNotes').value = p.notes || '';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function saveProperty() {
  const id = document.getElementById('editId').value || 'p_' + Date.now();
  const data = {
    id,
    name: document.getElementById('fName').value.trim() || 'Unnamed',
    city: document.getElementById('fCity').value.trim(),
    state: document.getElementById('fState').value.trim(),
    rent: parseFloat(document.getElementById('fRent').value) || 0,
    revenue: parseFloat(document.getElementById('fRevenue').value) || 0,
    spread: parseFloat(document.getElementById('fSpread').value) || 0,
    status: document.getElementById('fStatus').value,
    notes: document.getElementById('fNotes').value.trim(),
  };

  if (document.getElementById('editId').value) {
    const idx = properties.findIndex(p => p.id === id);
    if (idx >= 0) properties[idx] = { ...properties[idx], ...data };
  } else {
    properties.push(data);
  }
  saveData();
  render();
  closeModal();
  showToast('Property saved');
}

function deleteProperty(id) {
  if (!confirm('Delete this property?')) return;
  properties = properties.filter(p => p.id !== id);
  saveData();
  render();
  showToast('Property deleted');
}

// ─── Export / Import ─────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(properties, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rl-str-deal-flow-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data)) {
        properties = data;
        saveData();
        render();
        showToast(`Imported ${data.length} properties`);
      }
    } catch(err) {
      showToast('Invalid file format');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Toast ────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Init ─────────────────────────────────────────────────────────
window.onload = function() {
  setTimeout(() => {
    loadData();
    render();
  }, 100);
};
</script>
